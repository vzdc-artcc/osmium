opencollection: 1.0.0

info:
  name: vZDC Osmium
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: hostname
      value: http://localhost:3000
    - name: cid
      value: "10000010"
    - name: oauth_code
      value: replace-with-oauth-code
    - name: oauth_state
      value: replace-with-oauth-state
    - name: event_id
      value: replace-with-event-id
    - name: position_id
      value: replace-with-position-id
    - name: event_user_id
      value: replace-with-user-id
    - name: training_student_id
      value: replace-with-student-user-id
    - name: training_trainer_id
      value: replace-with-trainer-user-id
    - name: training_other_trainer_id
      value: replace-with-other-trainer-user-id
    - name: training_request_id
      value: replace-with-request-id
    - name: user_limit
      value: "25"
    - name: visit_artcc
      value: "ZDC"
    - name: controller_status
      value: "VISITOR"
    - name: stats_month
      value: "3"
    - name: stats_year
      value: "2026"
    - name: stats_all_time
      value: "false"
    - name: stats_top
      value: "3"
    - name: stats_limit
      value: "100"
    - name: feedback_id
      value: replace-with-feedback-id
    - name: feedback_target_cid
      value: "10000010"
    - name: feedback_limit
      value: "25"
    - name: feedback_offset
      value: "0"
    - name: feedback_status
      value: ""
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
