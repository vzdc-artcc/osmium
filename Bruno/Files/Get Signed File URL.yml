info:
  name: Get Signed File URL
  type: http
  seq: 54

http:
  method: GET
  url: "{{hostname}}/api/v1/files/{{file_id}}/signed-url?expires_in={{file_signed_expires_in}}&never_expire={{file_signed_never_expire}}"
  params:
    - name: expires_in
      value: "{{file_signed_expires_in}}"
      type: query
    - name: never_expire
      value: "{{file_signed_never_expire}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
