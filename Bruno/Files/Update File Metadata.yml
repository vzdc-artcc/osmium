info:
  name: Update File Metadata
  type: http
  seq: 51

http:
  method: PATCH
  url: "{{hostname}}/api/v1/files/{{file_id}}"
  auth: inherit
  body:
    mode: json
    json: |
      {
        "filename": "updated-{{file_name}}",
        "content_type": "application/octet-stream",
        "is_public": true,
        "owner_cid": null,
        "viewer_cids": [],
        "viewer_roles": []
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

