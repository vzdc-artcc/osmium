info:
  name: Upload File
  type: http
  seq: 48

http:
  method: POST
  url: "{{hostname}}/api/v1/files?filename={{file_name}}&public={{file_public}}"
  headers:
    - name: Content-Type
      value: application/octet-stream
  body:
    type: file
    data:
      - filePath: /Users/vainnor/Downloads/inst-flight.pdf
        contentType: application/pdf
        selected: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
