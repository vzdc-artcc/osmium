info:
  name: VATSIM Callback
  type: http
  seq: 6

http:
  method: GET
  url: "{{hostname}}/api/v1/auth/vatsim/callback"
  params:
    - name: code
      value: "{{oauth_code}}"
    - name: state
      value: "{{oauth_state}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
