info:
  name: Create Feedback
  type: http
  seq: 44

http:
  method: POST
  url: "{{hostname}}/api/v1/feedback"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "target_cid":{{feedback_target_cid}},
        "pilot_callsign": "N123AB",
        "controller_position": "DCA_TWR",
        "rating": 4,
        "comments": "Great sequencing and comms."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
