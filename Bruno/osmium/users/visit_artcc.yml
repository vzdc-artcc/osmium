info:
  name: visit_artcc
  type: http
  seq: 2
  tags:
    - users

http:
  method: POST
  url: "{{baseUrl}}/api/v1/user/visit-artcc"
  body:
    type: json
    data: |-
      {
        "artcc": "",
        "rating": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Visitor roster membership upserted
    request:
      url: "{{baseUrl}}/api/v1/user/visit-artcc"
      method: POST
      body:
        type: json
        data: |-
          {
            "artcc": "",
            "rating": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "artcc": "",
            "cid": 0,
            "rating": "",
            "roster_added": false,
            "status": ""
          }
  - name: 400 Response
    description: Invalid request
    request:
      url: "{{baseUrl}}/api/v1/user/visit-artcc"
      method: POST
      body:
        type: json
        data: |-
          {
            "artcc": "",
            "rating": ""
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Not authenticated
    request:
      url: "{{baseUrl}}/api/v1/user/visit-artcc"
      method: POST
      body:
        type: json
        data: |-
          {
            "artcc": "",
            "rating": ""
          }
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
