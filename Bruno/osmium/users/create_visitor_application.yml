    description: Visitor application submitted
    request:
      url: "{{baseUrl}}/api/v1/user/visitor-application"
      method: POST
      body:
        type: json
        data: |-
          {
            "home_facility": "",
            "why_visit": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "cid": "",
            "decided_at": "",
            "decided_by_actor_id": "",
            "display_name": "",
            "home_facility": "",
            "id": "",
            "reason_for_denial": "",
            "status": "",
            "submitted_at": "",
            "user_id": "",
            "why_visit": ""
          }
  - name: 400 Response
    description: Invalid request
    request:
      url: "{{baseUrl}}/api/v1/user/visitor-application"
