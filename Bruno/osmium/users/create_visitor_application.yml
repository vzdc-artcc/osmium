info:
  name: create_visitor_application
  type: http
  seq: 4
  tags:
    - users

http:
  method: POST
  url: "{{baseUrl}}/api/v1/user/visitor-application"
  body:
    type: json
    data: |-
      {
        "home_facility": "",
        "why_visit": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
