info:
  name: create_visitor_application
  type: http
  seq: 5
  tags:
    - users

http:
  method: POST
  url: "{{baseUrl}}/api/v1/user/visitor-application"
  body:
    type: json
    data: |+
      {
        "home_facility": "ZNY",
        "why_visit": "Interested in local procedures and event participation."
      }

  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Visitor application submitted
    request:
      url: "{{baseUrl}}/api/v1/user/visitor-application"
      method: POST
      body:
        type: json
        data: |-
          {
            "home_facility": "ZNY",
            "why_visit": "Interested in local procedures and event participation."
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "user_id": "",
            "cid": 0,
            "display_name": "",
            "home_facility": "ZNY",
            "why_visit": "Interested in local procedures and event participation.",
            "status": "PENDING",
            "reason_for_denial": null,
            "submitted_at": "2026-04-28T00:00:00Z",
            "decided_at": null,
            "decided_by_actor_id": null
          }
  - name: 400 Response
    description: Invalid request
    request:
      url: "{{baseUrl}}/api/v1/user/visitor-application"
      method: POST
      body:
        type: json
        data: |-
          {
            "home_facility": "",
            "why_visit": ""
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Not authenticated
    request:
      url: "{{baseUrl}}/api/v1/user/visitor-application"
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
