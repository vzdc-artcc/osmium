info:
  name: list_users
  type: http
  seq: 1
  tags:
    - users

http:
  method: GET
  url: "{{baseUrl}}/api/v1/user"
  params:
    - name: limit
      value: ""
      type: query
      description: Maximum number of users to return
      disabled: true
    - name: offset
      value: ""
      type: query
      description: Pagination offset
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
