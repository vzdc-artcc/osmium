          type: query
          description: Maximum number of users to return
          disabled: true
        - name: offset
          value: ""
          type: query
          description: Pagination offset
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "basic": {
                "cid": 0,
                "name": "",
                "rating": ""
              },
              "full": ""
            }
          ]
  - name: 401 Response
