    description: User details
    request:
      url: "{{baseUrl}}/api/v1/user/:cid"
      method: GET
      params:
        - name: cid
          value: ""
          type: path
          description: VATSIM CID
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "basic": {
              "cid": 0,
              "name": "",
              "rating": ""
            },
            "full": ""
          }
  - name: 400 Response
    description: Invalid CID
    request:
      url: "{{baseUrl}}/api/v1/user/:cid"
      method: GET
      params:
        - name: cid
          value: ""
          type: path
          description: VATSIM CID
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Not authenticated
    request:
      url: "{{baseUrl}}/api/v1/user/:cid"
      method: GET
      params:
        - name: cid
          value: ""
