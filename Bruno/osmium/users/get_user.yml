info:
  name: get_user
  type: http
  seq: 5
  tags:
    - users

http:
  method: GET
  url: "{{baseUrl}}/api/v1/user/:cid"
  params:
    - name: cid
      value: ""
      type: path
      description: VATSIM CID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
