info:
  name: refresh_my_vatusa
  type: http
  seq: 3
  tags:
    - users

http:
  method: POST
  url: "{{baseUrl}}/api/v1/user/refresh-vatusa"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Current user refreshed from VATUSA
    request:
      url: "{{baseUrl}}/api/v1/user/refresh-vatusa"
      method: POST
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "refresh_result": {
              "cid": 0,
              "detail_refreshed": true,
              "membership_outcome": "HOME",
              "membership_updated": true,
              "message": ""
            },
            "user": {
              "basic": {
                "cid": 0,
                "name": "",
                "rating": ""
              },
              "full": null
            }
          }
  - name: 400 Response
    description: Invalid request
    request:
      url: "{{baseUrl}}/api/v1/user/refresh-vatusa"
      method: POST
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Not authenticated
    request:
      url: "{{baseUrl}}/api/v1/user/refresh-vatusa"
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
