info:
  name: update_welcome_message_content
  type: http
  seq: 2
  tags:
    - welcome-messages

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/admin/welcome-messages"
  body:
    type: json
    data: |-
      {
        "home_text": "Welcome back! Here's what's changed since your last session...",
        "visitor_text": "Welcome to vZDC as a visiting controller..."
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Welcome message content updated
    request:
      url: "{{baseUrl}}/api/v1/admin/welcome-messages"
      method: PATCH
      body:
        type: json
        data: |-
          {
            "home_text": "Welcome back! Here's what's changed since your last session...",
            "visitor_text": "Welcome to vZDC as a visiting controller..."
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "home_text": "Welcome back! Here's what's changed since your last session...",
            "visitor_text": "Welcome to vZDC as a visiting controller..."
          }
  - name: 400 Response
    description: Invalid request
    request:
      url: "{{baseUrl}}/api/v1/admin/welcome-messages"
      method: PATCH
