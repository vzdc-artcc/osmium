info:
  name: admin_list_publication_categories
  type: http
  seq: 3
  tags:
    - publications

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/publications/categories"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: List publication categories for admin
    request:
      url: "{{baseUrl}}/api/v1/admin/publications/categories"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "created_at": "",
              "description": "",
              "id": "",
              "key": "",
              "name": "",
              "sort_order": 0,
              "updated_at": ""
            }
          ]
  - name: 401 Response
    description: Not authorized
    request:
      url: "{{baseUrl}}/api/v1/admin/publications/categories"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
