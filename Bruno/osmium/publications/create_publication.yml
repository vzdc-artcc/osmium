info:
  name: create_publication
  type: http
  seq: 2
  tags:
    - publications

http:
  method: POST
  url: "{{baseUrl}}/api/v1/admin/publications"
  body:
    type: json
    data: |-
      {
        "category_id": "",
        "description": "",
        "effective_at": "",
        "file_id": "",
        "is_public": false,
        "sort_order": "",
        "status": "",
        "title": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

