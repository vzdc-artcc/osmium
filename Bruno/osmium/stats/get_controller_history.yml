info:
  name: get_controller_history
  type: http
  seq: 3
  tags:
    - stats

http:
  method: GET
  url: "{{baseUrl}}/api/v1/stats/controller/:cid/history"
  params:
    - name: cid
      value: ""
      type: path
      description: VATSIM CID
    - name: environment
      value: ""
      type: query
      description: "Environment: live, sweatbox1, or sweatbox2"
      disabled: true
    - name: year
      value: ""
      type: query
      description: Calendar year
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Controller monthly history
    request:
      url: "{{baseUrl}}/api/v1/stats/controller/:cid/history"
      method: GET
      params:
        - name: cid
          value: ""
          type: path
          description: VATSIM CID
        - name: environment
          value: ""
          type: query
          description: "Environment: live, sweatbox1, or sweatbox2"
          disabled: true
        - name: year
          value: ""
          type: query
          description: Calendar year
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "cid": 0,
            "environment": "",
            "months": [
              {
                "active_hours": 0,
                "center_hours": 0,
                "delivery_hours": 0,
                "ground_hours": 0,
                "month": 0,
                "online_hours": 0,
                "total_hours": 0,
                "tower_hours": 0,
                "tracon_hours": 0
              }
            ],
            "name": "",
            "rating": "",
            "year": 0
          }
  - name: 400 Response
    description: Invalid query
    request:
      url: "{{baseUrl}}/api/v1/stats/controller/:cid/history"
      method: GET
      params:
        - name: cid
          value: ""
          type: path
          description: VATSIM CID
        - name: environment
          value: ""
          type: query
          description: "Environment: live, sweatbox1, or sweatbox2"
          disabled: true
        - name: year
          value: ""
          type: query
          description: Calendar year
          disabled: true
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
