          value: ""
          type: query
          description: Month 1-12
          disabled: true
        - name: year
          value: ""
          type: query
          description: Calendar year
          disabled: true
        - name: top
          value: ""
          type: query
          description: Leader count
          disabled: true
        - name: limit
          value: ""
          type: query
          description: Controller row count
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
