info:
  name: get_artcc_stats
  type: http
  seq: 1
  tags:
    - stats

http:
  method: GET
  url: "{{baseUrl}}/api/v1/stats/artcc"
  params:
    - name: environment
      value: ""
      type: query
      description: "Environment: live, sweatbox1, or sweatbox2"
      disabled: true
    - name: all_time
      value: ""
      type: query
      description: Return all-time totals
      disabled: true
    - name: month
      value: ""
      type: query
      description: Month 1-12
      disabled: true
    - name: year
      value: ""
      type: query
      description: Calendar year
      disabled: true
    - name: top
      value: ""
      type: query
      description: Leader count
      disabled: true
    - name: limit
      value: ""
      type: query
      description: Controller row count
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: ARTCC statistics summary
    request:
      url: "{{baseUrl}}/api/v1/stats/artcc"
      method: GET
      params:
        - name: environment
