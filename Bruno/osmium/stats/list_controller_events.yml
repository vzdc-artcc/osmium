info:
  name: list_controller_events
  type: http
  seq: 2
  tags:
    - stats

http:
  method: GET
  url: "{{baseUrl}}/api/v1/stats/controller-events"
  params:
    - name: environment
      value: ""
      type: query
      description: "Environment: live, sweatbox1, or sweatbox2"
      disabled: true
    - name: after_id
      value: ""
      type: query
      description: Return events after this durable event id
      disabled: true
    - name: limit
      value: ""
      type: query
      description: Max events to return
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

