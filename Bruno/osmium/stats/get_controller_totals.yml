info:
  name: get_controller_totals
  type: http
  seq: 4
  tags:
    - stats

http:
  method: GET
  url: "{{baseUrl}}/api/v1/stats/controller/:cid/totals"
  params:
    - name: cid
      value: ""
      type: path
      description: VATSIM CID
    - name: environment
      value: ""
      type: query
      description: "Environment: live, sweatbox1, or sweatbox2"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
