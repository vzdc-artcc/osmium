info:
  name: update_statistics_prefixes
  type: http
  seq: 6
  tags:
    - stats

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/admin/stats/prefixes"
  body:
    type: json
    data: |-
      {
        "prefixes": [
          "PCT",
          "DCA"
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
