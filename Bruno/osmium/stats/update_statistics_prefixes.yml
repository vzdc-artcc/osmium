    description: Statistics prefixes updated
    request:
      url: "{{baseUrl}}/api/v1/admin/stats/prefixes"
      method: PATCH
      body:
        type: json
        data: |-
          {
            "prefixes": [
              "PCT",
              "DCA"
            ]
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "prefixes": [
              "PCT",
              "DCA"
            ],
            "updated_at": ""
          }
  - name: 400 Response
    description: Invalid request
