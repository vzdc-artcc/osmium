info:
  name: list_ots_recommendations
  type: http
  seq: 8
  tags:
    - training

http:
  method: GET
  url: "{{baseUrl}}/api/v1/training/ots-recommendations"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: List OTS recommendations
    request:
      url: "{{baseUrl}}/api/v1/training/ots-recommendations"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "assigned_instructor_id": "",
              "created_at": "",
              "id": "",
              "notes": "",
              "student_id": "",
              "updated_at": ""
            }
          ]
  - name: 401 Response
    description: Not authorized
    request:
      url: "{{baseUrl}}/api/v1/training/ots-recommendations"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
