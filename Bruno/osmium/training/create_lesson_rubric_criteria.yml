info:
  name: create_lesson_rubric_criteria
  type: http
  seq: 55
  tags:
    - training

http:
  method: POST
  url: "{{baseUrl}}/api/v1/training/lessons/:lesson_id/rubric-criteria"
  params:
    - name: lesson_id
      value: ""
      type: path
      description: Training lesson ID
  body:
    type: json
    data: |-
      {
        "criteria": "Radar Traffic Advisories",
        "description": "Issues traffic advisories when appropriate",
        "max_points": 4,
        "passing": 3
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

