info:
  name: update_lesson_rubric_cell
  type: http
  seq: 59
  tags:
    - training

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/training/lessons/:lesson_id/rubric-criteria/:criteria_id/cells/:cell_id"
  params:
    - name: lesson_id
      value: ""
      type: path
      description: Training lesson ID
    - name: criteria_id
      value: ""
      type: path
      description: Rubric criteria ID
    - name: cell_id
      value: ""
      type: path
      description: Rubric cell ID
  body:
    type: json
    data: |-
      {
        "points": 4,
        "description": "Consistently issued advisories with no prompting"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

