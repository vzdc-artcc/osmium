info:
  name: create_assignment
  type: http
  seq: 7
  tags:
    - training

http:
  method: POST
  url: "{{baseUrl}}/api/v1/training/assignments"
  body:
    type: json
    data: |-
      {
        "other_trainer_ids": "",
        "primary_trainer_id": "",
        "student_id": ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
