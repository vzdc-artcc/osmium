    description: Assignment created
    request:
      url: "{{baseUrl}}/api/v1/training/assignments"
      method: POST
      body:
        type: json
        data: |-
          {
            "other_trainer_ids": "",
            "primary_trainer_id": "",
            "student_id": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "created_at": "",
            "id": "",
            "primary_trainer_id": "",
            "student_id": "",
            "updated_at": ""
          }
  - name: 400 Response
    description: Invalid request
