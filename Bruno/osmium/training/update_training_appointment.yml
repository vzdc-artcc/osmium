  url: "{{baseUrl}}/api/v1/training/appointments/:appointment_id"
  params:
    - name: appointment_id
      value: ""
      type: path
      description: Training appointment ID
  body:
    type: json
    data: |-
      {
        "atc_booking_id": null,
        "double_booking": false,
        "environment": "Discord",
        "lesson_ids": [
          ""
