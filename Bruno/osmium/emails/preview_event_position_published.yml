info:
  name: preview_event_position_published
  type: http
  seq: 9
  tags:
    - emails

http:
  method: POST
  url: "{{baseUrl}}/api/v1/emails/preview"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "template_id": "events.position_published",
        "payload": {
          "event_title": "ZDC Friday Night Ops",
          "starts_at": "2026-05-10T20:00:00Z",
          "details_url": "https://example.com/events/123",
          "preheader": "Sign up now!"
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
