info:
  name: get_access_catalog
  type: http
  seq: 1
  tags:
    - admin

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/access/catalog"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Assignable roles and permissions
    request:
      url: "{{baseUrl}}/api/v1/admin/access/catalog"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "permissions": {},
            "roles": []
          }
  - name: 401 Response
    description: Not authorized
    request:
      url: "{{baseUrl}}/api/v1/admin/access/catalog"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
