info:
  name: list_visitor_applications
  type: http
  seq: 6
  tags:
    - admin

http:
  method: GET
  url: "{{baseUrl}}/api/v1/admin/visitor-applications"
  params:
    - name: status
      value: PENDING
      disabled: true
    - name: limit
      value: "25"
      disabled: true
    - name: offset
      value: "0"
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Visitor applications
    request:
      url: "{{baseUrl}}/api/v1/admin/visitor-applications"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "user_id": "",
              "cid": 0,
              "display_name": "",
              "home_facility": "ZNY",
              "why_visit": "Interested in local procedures and event participation.",
              "status": "PENDING",
              "reason_for_denial": null,
              "submitted_at": "2026-04-28T00:00:00Z",
              "decided_at": null,
              "decided_by_actor_id": null
            }
          ]
  - name: 400 Response
    description: Invalid request
    request:
      url: "{{baseUrl}}/api/v1/admin/visitor-applications?status=INVALID"
      method: GET
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Not authorized
    request:
      url: "{{baseUrl}}/api/v1/admin/visitor-applications"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
