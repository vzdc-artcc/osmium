info:
  name: service_account_me
  type: http
  seq: 2
  tags:
    - auth

http:
  method: GET
  url: "{{baseUrl}}/api/v1/auth/service-account/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Current authenticated service account
    request:
      url: "{{baseUrl}}/api/v1/auth/service-account/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "key": "",
            "name": "",
            "permissions": {},
            "roles": []
          }
  - name: 401 Response
    description: Not authenticated
    request:
      url: "{{baseUrl}}/api/v1/auth/service-account/me"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
