info:
  name: me
  type: http
  seq: 5
  tags:
    - auth

http:
  method: GET
  url: "{{baseUrl}}/api/v1/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Current authenticated user session
    request:
      url: "{{baseUrl}}/api/v1/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": "",
            "cid": 0,
            "email": "",
            "display_name": "",
            "rating": "",
            "role": "",
            "roles": [],
            "permissions": {},
            "profile": {
              "first_name": "",
              "last_name": "",
              "preferred_name": "",
              "bio": "",
              "timezone": "America/Chicago",
              "receive_event_notifications": false,
              "operating_initials": "JC"
            },
            "teamspeak_uids": [
              {
                "id": "",
                "uid": "",
                "linked_at": "2026-05-04T12:00:00Z"
              }
            ]
          }
  - name: 401 Response
    description: Not authenticated
    request:
      url: "{{baseUrl}}/api/v1/me"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
