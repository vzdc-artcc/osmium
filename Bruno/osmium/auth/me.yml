info:
  name: me
  type: http
  seq: 5
  tags:
    - auth

http:
  method: GET
  url: "{{baseUrl}}/api/v1/me"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Current authenticated user session
    request:
      url: "{{baseUrl}}/api/v1/me"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "cid": 0,
            "display_name": "",
            "email": "",
            "id": "",
            "permissions": {},
            "rating": "",
            "role": "",
            "roles": []
          }
  - name: 401 Response
    description: Not authenticated
    request:
      url: "{{baseUrl}}/api/v1/me"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
