info:
  name: logout
  type: http
  seq: 1
  tags:
    - auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/logout"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 204 Response
    description: Session revoked
    request:
      url: "{{baseUrl}}/api/v1/auth/logout"
      method: POST
    response:
      status: 204
      statusText: No Content
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Not authenticated
    request:
      url: "{{baseUrl}}/api/v1/auth/logout"
      method: POST
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
