info:
  name: add_teamspeak_uid
  type: http
  seq: 8
  tags:
    - auth

http:
  method: POST
  url: "{{baseUrl}}/api/v1/me/teamspeak-uids"
  auth: inherit
  body:
    mode: json
    json: |-
      {
        "uid": "AbCdEf123"
      }

settings:
