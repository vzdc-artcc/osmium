    description: Added TeamSpeak UID
    request:
      url: "{{baseUrl}}/api/v1/me/teamspeak-uids"
      method: POST
    response:
      status: 200
      statusText: OK
  - name: 400 Response
    description: Invalid request
    request:
      url: "{{baseUrl}}/api/v1/me/teamspeak-uids"
      method: POST
    response:
      status: 400
      statusText: Bad Request
  - name: 401 Response
    description: Not authenticated
    request:
      url: "{{baseUrl}}/api/v1/me/teamspeak-uids"
      method: POST
    response:
      status: 401
      statusText: Unauthorized
