info:
  name: patch_me
  type: http
  seq: 6
  tags:
    - auth

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/me"
  auth: inherit
  body:
    mode: json
    json: |-
      {
        "preferred_name": "Jay",
        "timezone": "America/Chicago",
        "bio": "Facility controller.",
        "receive_event_notifications": true
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Updated current user profile
    request:
      url: "{{baseUrl}}/api/v1/me"
      method: PATCH
    response:
      status: 200
      statusText: OK
  - name: 400 Response
    description: Invalid request
    request:
      url: "{{baseUrl}}/api/v1/me"
      method: PATCH
    response:
      status: 400
      statusText: Bad Request
  - name: 401 Response
    description: Not authenticated
    request:
      url: "{{baseUrl}}/api/v1/me"
      method: PATCH
    response:
      status: 401
      statusText: Unauthorized
--- 
