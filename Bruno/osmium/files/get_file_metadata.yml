info:
  name: get_file_metadata
  type: http
  seq: 4
  tags:
    - files

http:
  method: GET
  url: "{{baseUrl}}/api/v1/files/:file_id"
  params:
    - name: file_id
      value: ""
      type: path
      description: File ID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: File metadata
    request:
      url: "{{baseUrl}}/api/v1/files/:file_id"
      method: GET
      params:
        - name: file_id
          value: ""
          type: path
          description: File ID
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "content_type": "",
            "created_at": "",
            "etag": "",
            "filename": "",
            "id": "",
            "is_public": false,
            "owner_user_id": "",
            "size_bytes": 0,
            "updated_at": "",
            "uploaded_by": "",
            "viewer_roles": []
          }
  - name: 400 Response
    description: Invalid file ID
    request:
      url: "{{baseUrl}}/api/v1/files/:file_id"
      method: GET
      params:
        - name: file_id
          value: ""
          type: path
          description: File ID
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Not authorized
    request:
      url: "{{baseUrl}}/api/v1/files/:file_id"
      method: GET
      params:
        - name: file_id
          value: ""
          type: path
          description: File ID
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
