        data: |-
          [
            {
              "assigned_slot": "",
              "callsign": "",
              "created_at": "",
              "event_id": "",
              "id": "",
              "published": false,
              "requested_slot": "",
              "status": "",
              "updated_at": "",
              "user_id": ""
            }
          ]
  - name: 400 Response
    description: Invalid event ID
    request:
      url: "{{baseUrl}}/api/v1/events/:event_id/positions"
      method: GET
      params:
        - name: event_id
          value: ""
