http:
  method: GET
  url: "{{baseUrl}}/api/v1/events/:event_id/positions"
  params:
    - name: event_id
      value: ""
      type: path
      description: Event ID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
