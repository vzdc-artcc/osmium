  type: http
  seq: 10
  tags:
    - events

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/events/:event_id/positions/:position_id"
  params:
    - name: event_id
      value: ""
      type: path
      description: Event ID
    - name: position_id
      value: ""
      type: path
      description: Position ID
  body:
    type: json
    data: |-
