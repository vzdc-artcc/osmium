info:
  name: Set Controller Status
  type: http
  seq: 42

http:
  method: PATCH
  url: "{{hostname}}/api/v1/admin/users/{{cid}}/controller-status"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: '{"controller_status":"{{controller_status}}","artcc":"{{visit_artcc}}"}'
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

