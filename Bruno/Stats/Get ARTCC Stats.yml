info:
  name: Get ARTCC Stats
  type: http
  seq: 38

http:
  method: GET
  url: "{{hostname}}/api/v1/stats/artcc?all_time={{stats_all_time}}&month={{stats_month}}&year={{stats_year}}&top={{stats_top}}&limit={{stats_limit}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

