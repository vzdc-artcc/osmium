name: CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  check:
    runs-on: ubuntu-latest
    needs: fmt

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --workspace --all-targets

  test:
    runs-on: ubuntu-latest
    needs: check

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: osmium_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d osmium_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/osmium_ci
      FILE_STORAGE_ROOT: /tmp/osmium-files
      FILE_SIGNING_SECRET: test-signing-secret
      CDN_BASE_URL: http://127.0.0.1:3000
      EMAIL_UNSUBSCRIBE_SECRET: test-unsub-secret
      EMAIL_UNSUBSCRIBE_BASE_URL: http://127.0.0.1:3000
      COOKIE_SECURE: "false"
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:3000
      VATSIM_DEV_MODE: "false"
      DEV_LOGIN_AS_CID_ENABLED: "false"
      DEV_SEED_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --all-targets -- --test-threads=1
